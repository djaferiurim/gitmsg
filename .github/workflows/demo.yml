name: Demo GIF

# Records demo/demo.gif from demo/demo.tape using VHS on Linux, where VHS runs
# reliably (it is flaky on Windows). Run it manually from the Actions tab, or
# it runs automatically whenever the tape changes.
on:
  workflow_dispatch:
  push:
    paths:
      - demo/demo.tape
      - scripts/record-demo.sh
      - .github/workflows/demo.yml

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Install ffmpeg, ttyd and vhs
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          go install github.com/charmbracelet/vhs@latest

      - name: Record demo
        run: bash scripts/record-demo.sh

      - name: Commit the updated GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(demo): update demo.gif"
          file_pattern: demo/demo.gif
